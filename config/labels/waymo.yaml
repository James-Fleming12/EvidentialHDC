# Waymo Open Dataset - SemanticKITTI format
# Source label IDs are the SKITTI IDs produced by WAYMO_TO_SKITTI_LABEL in convert_waymo.py
# Waymo 23-class enum (confirmed from segmentation proto):
#   0=UNDEFINED  1=CAR  2=TRUCK  3=BUS  4=OTHER_VEHICLE  5=MOTORCYCLIST
#   6=BICYCLIST  7=PEDESTRIAN  8=SIGN  9=TRAFFIC_LIGHT  10=POLE
#   11=CONSTRUCTION_CONE  12=BICYCLE  13=MOTORCYCLE  14=BUILDING
#   15=VEGETATION  16=TREE_TRUNK  17=CURB  18=ROAD  19=LANE_MARKER
#   20=WALKABLE  21=SIDEWALK  22=OTHER_GROUND
#
# WAYMO_TO_SKITTI_LABEL mapping used in converter:
#   0->0    1->9    2->10   3->18   4->18   5->16
#   6->15   7->13   8->0    9->17   10->0   11->0
#   12->15  13->16  14->0   15->72  16->70  17->40
#   18->40  19->44  20->48  21->51  22->52
#
# SKITTI IDs that appear in the converted data:
#   0  = unlabeled       (UNDEFINED, SIGN, TRAFFIC_LIGHT, POLE, BICYCLE->ignored)
#   9  = car             (CAR)
#   10 = truck           (TRUCK)
#   13 = motorcyclist    (BICYCLIST)
#   15 = motorcycle      (MOTORCYCLIST, CONSTRUCTION_CONE->merged)
#   16 = road            (MOTORCYCLIST->road?, CURB->road)  -- see note below
#   17 = parking         (TRAFFIC_LIGHT->parking? -- unused effectively)
#   18 = pedestrian      (BUS, OTHER_VEHICLE->merged here -- see note)
#   40 = road            (CURB, ROAD)
#   44 = parking         (LANE_MARKER)
#   48 = sidewalk        (WALKABLE)
#   51 = other-ground    (SIDEWALK)
#   52 = building        (OTHER_GROUND)
#   70 = terrain         (TREE_TRUNK)
#   72 = manmade         (VEGETATION)
#
# NOTE: The original WAYMO_TO_SKITTI_LABEL has some counterintuitive mappings
# (e.g. BUS->18/pedestrian, VEGETATION->72/manmade). These are inherited from
# the converter and reflected faithfully here so labels match what's on disk.

name: "waymo"

labels:
  0:  "unlabeled"
  9:  "car"
  10: "truck"
  13: "motorcyclist"
  15: "motorcycle"
  16: "curb"
  17: "traffic_light"
  18: "bus_or_other_vehicle"
  40: "road"
  44: "lane_marker"
  48: "walkable"
  51: "sidewalk"
  52: "other_ground"
  70: "tree_trunk"
  72: "vegetation"

color_map: # bgr
  0:  [0,   0,   0  ]   # unlabeled       black
  9:  [50,  120, 255]   # car             blue
  10: [0,   150, 255]   # truck           light blue
  13: [75,  0,   75 ]   # motorcyclist    dark purple
  15: [75,  0,   175]   # motorcycle      purple
  16: [128, 64,  128]   # curb            mauve
  17: [170, 255, 150]   # traffic_light   light green
  18: [0,   200, 255]   # bus/other veh   cyan
  40: [128, 64,  128]   # road            same as curb (both road-surface)
  44: [200, 128, 128]   # lane_marker     pink
  48: [244, 35,  232]   # walkable        magenta
  51: [81,  0,   81 ]   # sidewalk        dark magenta
  52: [152, 251, 152]   # other_ground    pale green
  70: [0,   100, 0  ]   # tree_trunk      dark green
  72: [0,   200, 0  ]   # vegetation      green

content: # rough point-frequency ratios for a driving dataset; refine after conversion
  0:  0.05
  9:  0.04
  10: 0.02
  13: 0.002
  15: 0.002
  16: 0.01
  17: 0.001
  18: 0.01
  40: 0.20
  44: 0.02
  48: 0.05
  51: 0.08
  52: 0.05
  70: 0.02
  72: 0.15

# learning_map collapses 15 raw SKITTI IDs -> 13 learned classes
# Classes 16 (curb) and 40 (road) both map to learned class 5 (road-surface)
# Classes 17 (traffic_light) and 44 (lane_marker) both map to learned class 6 (markers)
learning_map:
  0:  0   # unlabeled            -> ignore
  9:  1   # car                  -> car
  10: 2   # truck                -> truck
  13: 3   # motorcyclist         -> motorcyclist
  15: 4   # motorcycle           -> motorcycle
  16: 5   # curb                 -> road_surface
  17: 6   # traffic_light        -> road_marker
  18: 7   # bus_or_other_vehicle -> large_vehicle
  40: 5   # road                 -> road_surface
  44: 6   # lane_marker          -> road_marker
  48: 8   # walkable             -> walkable
  51: 9   # sidewalk             -> sidewalk
  52: 10  # other_ground         -> other_ground
  70: 11  # tree_trunk           -> tree_trunk
  72: 12  # vegetation           -> vegetation

learning_map_inv:
  0:  0   # ignore        -> unlabeled
  1:  9   # car           -> car
  2:  10  # truck         -> truck
  3:  13  # motorcyclist  -> motorcyclist
  4:  15  # motorcycle    -> motorcycle
  5:  40  # road_surface  -> road (canonical)
  6:  44  # road_marker   -> lane_marker (canonical)
  7:  18  # large_vehicle -> bus_or_other_vehicle
  8:  48  # walkable      -> walkable
  9:  51  # sidewalk      -> sidewalk
  10: 52  # other_ground  -> other_ground
  11: 70  # tree_trunk    -> tree_trunk
  12: 72  # vegetation    -> vegetation

learning_ignore:
  0:  True   # unlabeled
  1:  False  # car
  2:  False  # truck
  3:  False  # motorcyclist
  4:  False  # motorcycle
  5:  False  # road_surface
  6:  False  # road_marker
  7:  False  # large_vehicle
  8:  False  # walkable
  9:  False  # sidewalk
  10: False  # other_ground
  11: False  # tree_trunk
  12: False  # vegetation

