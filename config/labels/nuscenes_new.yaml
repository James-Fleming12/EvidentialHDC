# nuScenes-lidarseg converted to SemanticKITTI format via KittiConverter.
# Labels on disk are raw nuScenes lidarseg uint32 indices (0-31),
# stored directly with np.uint32(lidar_panoptic_anno).tofile()
# NO remapping happens in the converter — learning_map does it at load time.
#
# Confirmed nuScenes lidarseg index -> class name (from nusc.lidarseg_idx2name_mapping):
#  0: noise                              16: vehicle.bus.rigid
#  1: animal                             17: vehicle.car
#  2: human.pedestrian.adult             18: vehicle.construction
#  3: human.pedestrian.child             19: vehicle.emergency.ambulance
#  4: human.pedestrian.construction_worker  20: vehicle.emergency.police
#  5: human.pedestrian.personal_mobility 21: vehicle.motorcycle
#  6: human.pedestrian.police_officer    22: vehicle.trailer
#  7: human.pedestrian.stroller         23: vehicle.truck
#  8: human.pedestrian.wheelchair       24: flat.driveable_surface
#  9: movable_object.barrier            25: flat.other
# 10: movable_object.debris             26: flat.sidewalk
# 11: movable_object.pushable_pullable  27: flat.terrain
# 12: movable_object.trafficcone        28: static.manmade
# 13: static_object.bicycle_rack        29: static.other
# 14: vehicle.bicycle                   30: static.vegetation
# 15: vehicle.bus.bendy                 31: vehicle.ego

